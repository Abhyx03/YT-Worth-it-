<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worth It?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-feature-settings: 'cv02','cv03','cv04','cv11';
      text-rendering: optimizeLegibility;
      background: linear-gradient(160deg, #f8fafc 0%, #eef2ff 100%);
      background-attachment: fixed;
      color: #1e293b;
      min-height: 100vh;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Focus visible */
    :focus-visible { outline: 2px solid #6366f1; outline-offset: 2px; }
    :focus:not(:focus-visible) { outline: none; }

    #app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 3rem;
      padding: 3.5rem 2rem 2.75rem;
      background: linear-gradient(135deg, #6366f1 0%, #818cf8 50%, #a5b4fc 100%);
      border-radius: 0 0 32px 32px;
      margin-left: -1.5rem;
      margin-right: -1.5rem;
    }
    .header-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .header-icon {
      width: 48px; height: 48px;
      background: rgba(255,255,255,0.18);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    header h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -2px;
      color: #fff;
      line-height: 1;
    }
    header h1 span { color: rgba(255,255,255,0.55); }
    .subtitle {
      color: rgba(255,255,255,0.75);
      font-size: 1.05rem;
      font-weight: 400;
    }

    /* ── Form ── */
    #form-section {
      background: #fff;
      border: none;
      border-radius: 20px;
      padding: 1.75rem;
      max-width: 680px;
      margin: 0 auto 2rem;
      box-shadow: 0 4px 6px rgba(0,0,0,.04), 0 12px 40px rgba(99,102,241,.10);
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(99,102,241,0.8);
      margin-bottom: 0.45rem;
    }

    textarea, input[type="text"] {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 0.7rem 0.95rem;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1e293b;
      background: #fff;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.04);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    textarea:focus, input[type="text"]:focus {
      border-color: #6366f1;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.04), 0 0 0 3px rgba(99,102,241,.15);
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .field { margin-bottom: 1.1rem; }
    #url-2-row { margin-top: 0.6rem; }

    #add-url-btn {
      background: #f1f5ff;
      border: 1px solid #c7d2fe;
      border-radius: 10px;
      color: #6366f1;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: inherit;
      padding: 0.55rem 1rem;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: background 0.15s, border-color 0.15s;
    }
    #add-url-btn:hover { background: #e0e7ff; border-color: #818cf8; }

    #analyse-btn {
      width: 100%;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.85rem;
      font-size: 1.02rem;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.02em;
      cursor: pointer;
      margin-top: 0.5rem;
      box-shadow: 0 4px 12px rgba(99,102,241,.40);
      transform: translateY(0);
      transition: box-shadow 0.2s, transform 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    #analyse-btn:hover {
      box-shadow: 0 6px 20px rgba(99,102,241,.50);
      transform: translateY(-1px);
    }
    #analyse-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 6px rgba(99,102,241,.30);
    }
    #analyse-btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    /* ── Skeleton shimmer ── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .skeleton-block {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 1200px 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 6px;
    }
    .skeleton-card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(99,102,241,.07);
    }
    .skeleton-thumb { width: 100%; height: 180px; }
    .skeleton-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .skeleton-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .skeleton-circle { width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-lines { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }

    /* ── Error banner ── */
    #error-banner {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-left: 4px solid #ef4444;
      border-radius: 12px;
      padding: 0.9rem 1.1rem;
      color: #991b1b;
      max-width: 680px;
      margin: 0 auto 1.5rem;
      font-size: 0.92rem;
      box-shadow: 0 4px 12px rgba(239,68,68,.08);
    }

    /* ── Spin animation (reused for btn spinner) ── */
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results grid ── */
    #results-section { display: none; }
    .results-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 1rem;
    }

    #results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 1.5rem;
    }

    /* ── Result card ── */
    .result-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(99,102,241,.07);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      overflow: visible;
      position: relative;
    }
    .result-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(99,102,241,.14), 0 2px 8px rgba(0,0,0,.06);
    }

    /* Thumbnail */
    .card-thumb-wrap {
      position: relative;
      width: calc(100% + 3rem);
      margin: -1.5rem -1.5rem 1.25rem;
      border-radius: 20px 20px 0 0;
      overflow: hidden;
      aspect-ratio: 16/9;
      background: #e2e8f0;
    }
    .card-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .result-card:hover .card-thumb { transform: scale(1.04); }
    .thumb-play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .result-card:hover .thumb-play-overlay { opacity: 1; }

    /* Score ring */
    .score-wrap {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .score-ring-container {
      position: relative;
      width: 90px; height: 90px;
      flex-shrink: 0;
    }
    .score-ring-container svg { transform: rotate(-90deg); }
    .score-ring-container .track { stroke: #e2e8f0; }
    .score-ring-container .fill  { stroke: #6366f1; transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1); }
    .score-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .score-value { font-size: 1.5rem; font-weight: 800; color: #0f172a; }
    .score-label { font-size: 0.62rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }

    .score-meta { flex: 1; min-width: 0; }
    .score-meta .video-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.82rem;
      color: #6366f1;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .score-meta .video-link:hover { text-decoration: underline; }
    .score-meta .relevance-label {
      font-size: 0.76rem;
      color: #94a3b8;
    }

    /* Card sections */
    .card-section { margin-bottom: 1.1rem; }
    .card-section:last-child { margin-bottom: 0; }
    .card-section h3 {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }
    .card-section p { font-size: 0.9rem; color: #334155; line-height: 1.65; }

    /* Timestamp / chapter links */
    .ts-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.28rem 0.75rem;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      border-radius: 999px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.8rem;
      color: #4f46e5;
      text-decoration: none;
      transition: background 0.12s, border-color 0.12s;
    }
    .ts-link:hover { background: #e0e7ff; border-color: #a5b4fc; }

    .chapter-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .chapter-list li {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.88rem;
      color: #475569;
      padding: 0.3rem 0.5rem;
      border-radius: 8px;
      margin: 0 -0.5rem;
      transition: background 0.12s;
    }
    .chapter-list li:hover { background: #f8fafc; }
    .chapter-list li .ts-link { flex-shrink: 0; }

    /* Score colour variants */
    .fill-high   { stroke: #22c55e; }
    .fill-medium { stroke: #f59e0b; }
    .fill-low    { stroke: #ef4444; }

    /* Winner card */
    .result-card.winner {
      border-color: #22c55e;
      box-shadow: 0 0 0 2px #22c55e, 0 8px 30px rgba(34,197,94,.12);
    }
    .result-card.winner::before {
      content: "Winner";
      position: absolute;
      top: 0.9rem;
      right: 0;
      background: #22c55e;
      color: white;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.25rem 0.8rem;
      border-radius: 4px 0 0 4px;
      z-index: 2;
    }

    /* ── Verdict banner ── */
    .verdict-banner {
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      border: 1px solid #86efac;
      border-left: 4px solid #22c55e;
      border-radius: 16px;
      padding: 1.5rem 1.75rem;
      margin-bottom: 1.75rem;
      display: flex;
      align-items: flex-start;
      gap: 1.1rem;
      box-shadow: 0 4px 16px rgba(34,197,94,.10);
    }
    .verdict-icon { flex-shrink: 0; margin-top: 2px; }
    .verdict-eyebrow {
      display: inline-block;
      background: #dcfce7;
      border: 1px solid #86efac;
      color: #16a34a;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      margin-bottom: 0.45rem;
    }
    .verdict-winner {
      font-size: 1.1rem;
      font-weight: 800;
      color: #14532d;
      margin-bottom: 0.45rem;
      letter-spacing: -0.3px;
    }
    .verdict-reasoning {
      font-size: 0.9rem;
      color: #166534;
      line-height: 1.65;
    }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-inner">
      <div class="header-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="5" width="20" height="14" rx="3" fill="rgba(255,255,255,0.9)"/>
          <polygon points="10,8.5 10,15.5 16,12" fill="#6366f1"/>
        </svg>
      </div>
      <h1>Worth <span>It?</span></h1>
      <p class="subtitle">Find out if a YouTube video actually answers your question.</p>
    </div>
  </header>

  <section id="form-section">
    <div class="field">
      <label for="goal-input">Your learning goal</label>
      <textarea id="goal-input" placeholder="e.g. 'How do I build a REST API with FastAPI?'"></textarea>
    </div>

    <div class="field">
      <label for="url-1">YouTube URL</label>
      <input id="url-1" type="text" placeholder="https://www.youtube.com/watch?v=..." />
      <div id="url-2-row">
        <button id="add-url-btn" type="button">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Compare with another video
        </button>
        <input id="url-2" type="text" placeholder="https://www.youtube.com/watch?v=..." style="display:none; margin-top:0.6rem;" />
      </div>
    </div>

    <button id="analyse-btn" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Analyse
    </button>
  </section>

  <div id="error-banner"></div>

  <section id="results-section">
    <div id="verdict-container"></div>
    <div id="results-label-container"></div>
    <div id="results-grid"></div>
  </section>

</div>

<script>
  let twoUrlMode = false;

  document.getElementById("add-url-btn").addEventListener("click", () => {
    twoUrlMode = true;
    document.getElementById("url-2").style.display = "block";
    document.getElementById("add-url-btn").style.display = "none";
  });

  document.getElementById("analyse-btn").addEventListener("click", handleSubmit);

  async function handleSubmit() {
    const goal = document.getElementById("goal-input").value.trim();
    const url1 = document.getElementById("url-1").value.trim();
    const url2 = twoUrlMode ? document.getElementById("url-2").value.trim() : "";

    if (goal.length < 10) return showError("Please describe your goal in at least 10 characters.");
    if (!url1)            return showError("Please enter at least one YouTube URL.");

    const urls = url2 ? [url1, url2] : [url1];

    setLoading(true, urls.length);
    clearError();
    clearResults();

    try {
      const response = await fetch("/analyse", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ goal, urls }),
      });
      const data = await response.json();

      if (!response.ok) {
        showError(data.message || "An unexpected error occurred.");
        return;
      }

      renderResults(data.results, data.comparison);
    } catch (err) {
      showError("Network error — is the server running on port 8000?");
    } finally {
      setLoading(false);
    }
  }

  function renderResults(results, comparison) {
    const grid = document.getElementById("results-grid");
    const verdictContainer = document.getElementById("verdict-container");
    const labelContainer = document.getElementById("results-label-container");
    grid.innerHTML = "";
    verdictContainer.innerHTML = "";

    labelContainer.innerHTML = `<p class="results-label">Analysis Results &mdash; ${results.length} video${results.length > 1 ? "s" : ""}</p>`;

    if (comparison) {
      const winner = results.find(r => r.video_id === comparison.winner_video_id);
      const winnerLabel = winner ? `Video ${results.indexOf(winner) + 1}` : "Video";
      verdictContainer.innerHTML = `
        <div class="verdict-banner">
          <div class="verdict-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
              <path d="M8 21h8M12 17v4M17 3h3v5c0 2.76-2.24 5-5 5H9C6.24 13 4 10.76 4 8V3h3" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div>
            <span class="verdict-eyebrow">Recommended Watch</span>
            <div class="verdict-winner">${esc(winnerLabel)} is the better choice</div>
            <div class="verdict-reasoning">${esc(comparison.reasoning)}</div>
          </div>
        </div>`;
    }

    const circumference = 283; // 2 * pi * 45
    results.forEach((r, i) => {
      const card = buildResultCard(r, circumference);
      if (comparison && r.video_id === comparison.winner_video_id) {
        card.classList.add("winner");
      }
      card.style.opacity = "0";
      card.style.transform = "translateY(24px)";
      grid.appendChild(card);

      requestAnimationFrame(() => {
        setTimeout(() => {
          card.style.transition = "opacity 0.5s ease, transform 0.5s ease";
          card.style.opacity = "1";
          card.style.transform = "translateY(0)";
        }, i * 130);
      });

      // Animate score ring after card is in DOM
      const offset = circumference * (1 - r.relevance_score / 10);
      setTimeout(() => {
        const fillEl = card.querySelector(".fill");
        if (fillEl) fillEl.style.strokeDashoffset = offset.toFixed(1);
      }, i * 130 + 100);
    });

    document.getElementById("results-section").style.display = "block";
    document.getElementById("results-section").scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function buildResultCard(r, circumference) {
    const score = r.relevance_score;
    const fullOffset = circumference; // start empty

    let fillClass = "fill";
    if (score >= 7)      fillClass += " fill-high";
    else if (score >= 4) fillClass += " fill-medium";
    else                 fillClass += " fill-low";

    const chaptersHtml = r.chapters.map(ch =>
      `<li>
        <a href="${esc(ch.link)}" target="_blank" class="ts-link">${esc(ch.display)}</a>
        <span>${esc(ch.title)}</span>
      </li>`
    ).join("");

    const iconDoc = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`;
    const iconClock = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
    const iconList = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`;
    const iconExternal = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

    const card = document.createElement("div");
    card.className = "result-card";
    card.innerHTML = `
      <div class="card-thumb-wrap">
        <img
          class="card-thumb"
          src="https://img.youtube.com/vi/${esc(r.video_id)}/mqdefault.jpg"
          alt="Video thumbnail"
          loading="lazy"
          onerror="this.parentElement.style.display='none'"
        />
        <a href="${esc(r.original_url)}" target="_blank" class="thumb-play-overlay">
          <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
            <circle cx="26" cy="26" r="26" fill="rgba(0,0,0,0.52)"/>
            <polygon points="21,16 21,36 39,26" fill="white"/>
          </svg>
        </a>
      </div>

      <div class="score-wrap">
        <div class="score-ring-container">
          <svg viewBox="0 0 100 100" width="90" height="90">
            <circle class="track" cx="50" cy="50" r="45" fill="none" stroke-width="9"/>
            <circle class="${fillClass}" cx="50" cy="50" r="45" fill="none" stroke-width="9"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${fullOffset}"
              stroke-linecap="round"/>
          </svg>
          <div class="score-overlay">
            <span class="score-value">${score}</span>
            <span class="score-label">/ 10</span>
          </div>
        </div>
        <div class="score-meta">
          <a href="${esc(r.original_url)}" target="_blank" class="video-link">
            Open Video ${iconExternal}
          </a>
          <div class="relevance-label">Relevance score</div>
        </div>
      </div>

      <div class="card-section">
        <h3>${iconDoc} Summary</h3>
        <p>${esc(r.summary)}</p>
      </div>

      <div class="card-section">
        <h3>${iconClock} Where's the actual answer?</h3>
        <a href="${esc(r.answer_timestamp.link)}" target="_blank" class="ts-link">
          &#9654; Jump to ${esc(r.answer_timestamp.display)}
        </a>
      </div>

      <div class="card-section">
        <h3>${iconList} Chapter Breakdown</h3>
        <ul class="chapter-list">${chaptersHtml}</ul>
      </div>
    `;
    return card;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function buildSkeletonCard() {
    const card = document.createElement("div");
    card.className = "skeleton-card";
    card.innerHTML = `
      <div class="skeleton-block skeleton-thumb"></div>
      <div class="skeleton-body">
        <div class="skeleton-row">
          <div class="skeleton-block skeleton-circle"></div>
          <div class="skeleton-lines">
            <div class="skeleton-block" style="height:14px;width:60%"></div>
            <div class="skeleton-block" style="height:11px;width:40%"></div>
          </div>
        </div>
        <div class="skeleton-block" style="height:11px;width:100%"></div>
        <div class="skeleton-block" style="height:11px;width:90%"></div>
        <div class="skeleton-block" style="height:11px;width:75%"></div>
        <div style="display:flex;gap:0.5rem;margin-top:0.25rem">
          <div class="skeleton-block" style="height:26px;width:60px;border-radius:999px"></div>
          <div class="skeleton-block" style="height:26px;width:60px;border-radius:999px"></div>
          <div class="skeleton-block" style="height:26px;width:60px;border-radius:999px"></div>
        </div>
      </div>`;
    return card;
  }

  function setLoading(on, count) {
    const btn = document.getElementById("analyse-btn");
    const grid = document.getElementById("results-grid");

    if (on) {
      btn.disabled = true;
      btn.innerHTML = `
        <svg style="animation:spin 0.7s linear infinite;flex-shrink:0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.22-8.56"/></svg>
        Analysing&hellip;`;
      grid.innerHTML = "";
      document.getElementById("results-section").style.display = "block";
      document.getElementById("results-label-container").innerHTML = "";
      document.getElementById("verdict-container").innerHTML = "";
      const n = count || 1;
      for (let i = 0; i < n; i++) grid.appendChild(buildSkeletonCard());
    } else {
      btn.disabled = false;
      btn.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Analyse`;
    }
  }

  function showError(msg) {
    const banner = document.getElementById("error-banner");
    banner.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:0.6rem">
        <svg style="flex-shrink:0;margin-top:1px" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>${esc(msg)}</span>
      </div>`;
    banner.style.display = "block";
  }

  function clearError() {
    const banner = document.getElementById("error-banner");
    banner.style.display = "none";
    banner.innerHTML = "";
  }

  function clearResults() {
    document.getElementById("results-section").style.display = "none";
    document.getElementById("results-grid").innerHTML = "";
    document.getElementById("verdict-container").innerHTML = "";
    document.getElementById("results-label-container").innerHTML = "";
  }
</script>
</body>
</html>
